  <script>
    /**
     * SUPREME IMAGE INTERCEPTOR (Nuclear Phase 4)
     * Overrides every possible way an image can load a broken localhost URL.
     */
    (function() {
      const isDirty = (url) => {
        if (typeof url !== 'string') return false;
        // Don't intercept images from our OWN dev server (current origin) or relative paths
        if (url.startsWith(window.location.origin) || url.startsWith('/')) return false;
        // Intercept other localhost/127.0.0.1 URLs (broken database paths)
        return url.includes('localhost:') || url.includes('127.0.0.1:');
      };
      
      const getFallback = (url) => {
        try {
          // Instead of showing alphabets, try to REROUTE to local public path
          const parts = url.split('/');
          const fileName = parts[parts.length - 1];
          return `/${fileName}`;
        } catch(e) {
          return "https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&w=800&q=80";
        }
      };

      // 1. Override .src setter
      const originalSrc = Object.getOwnPropertyDescriptor(HTMLImageElement.prototype, 'src');
      Object.defineProperty(HTMLImageElement.prototype, 'src', {
          set: function(v) {
              if (isDirty(v)) originalSrc.set.call(this, getFallback(this.alt));
              else originalSrc.set.call(this, v);
          },
          get: function() { return originalSrc.get.call(this); }
      });

      // 2. Override .setAttribute
      const originalSetAttr = Element.prototype.setAttribute;
      Element.prototype.setAttribute = function(name, value) {
          if (name === 'src' && this.tagName === 'IMG' && isDirty(value)) {
              originalSetAttr.call(this, name, getFallback(this.getAttribute('alt')));
          } else {
              originalSetAttr.call(this, name, value);
          }
      };

      // 3. Early DOM MutationObserver (Catches images before React hydrates)
      const obs = new MutationObserver((ms) => {
        ms.forEach(m => m.addedNodes.forEach(n => {
          if (n.tagName === 'IMG' && isDirty(n.src)) n.src = getFallback(n.alt);
          else if (n.querySelectorAll) n.querySelectorAll('img').forEach(img => {
            if (isDirty(img.src)) img.src = getFallback(img.alt);
          });
        }));
      });
      obs.observe(document.documentElement, { childList: true, subtree: true });

      console.log("%c[SUPREME CLEANUP] Interceptor Active", "color: #38bdf8; font-weight: bold;");
    })();
  </script>
