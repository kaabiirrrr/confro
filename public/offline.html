<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>No Internet – Connect</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --text: #e2e8f0;
      --sub: #64748b;
      --card-bg: #1e293b;
      --border: #334155;
      --accent: #38bdf8;
      --btn-text: #0d1117;
      --status: #334155;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f1f5f9;
        --text: #0f172a;
        --sub: #64748b;
        --card-bg: #e2e8f0;
        --border: #cbd5e1;
        --accent: #0ea5e9;
        --btn-text: #ffffff;
        --status: #94a3b8;
      }
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      transition: background .2s, color .2s;
    }

    .logo-wrap { margin-bottom: 36px; }
    .logo-dark  { display: block; height: 28px; width: auto; }
    .logo-light { display: none;  height: 28px; width: auto; }

    @media (prefers-color-scheme: light) {
      .logo-dark  { display: none; }
      .logo-light { display: block; }
    }

    .card { max-width: 380px; width: 100%; text-align: center; }

    svg { width: 180px; height: 180px; margin: 0 auto 28px; display: block; opacity: .8; }

    h1 { font-size: 1.2rem; font-weight: 800; color: var(--text); margin-bottom: 8px; letter-spacing: -.02em; }
    p  { font-size: 0.78rem; color: var(--sub); line-height: 1.6; margin-bottom: 28px; }

    .btn {
      display: inline-block; padding: 9px 32px;
      background: var(--accent); color: var(--btn-text);
      border-radius: 999px; font-weight: 800;
      font-size: 0.68rem; letter-spacing: .12em; text-transform: uppercase;
      border: none; cursor: pointer; transition: opacity .2s;
    }
    .btn:hover { opacity: .85; }

    .status { margin-top: 16px; font-size: 0.62rem; color: var(--status); letter-spacing: .1em; text-transform: uppercase; }
  </style>
</head>
